<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Sanrio Quiz</title>
    <link rel="icon" href="data:image/svg+xml,<svg xmlns=%22http://www.w3.org/2000/svg%22 viewBox=%220 0 100 100%22><text y=%22.9em%22 font-size=%2280%22>🎮</text></svg>">
    <link rel="stylesheet" href="style.css">
</head>
<body>
    <div class="top-bar">
        ¿Qué personaje de Sanrio eres?
    </div>
    <div class="quiz-container">
        <div id="question-container">
            <h2 id="question"></h2>
            <div id="options-container" class="options"></div>
        </div>
        <div class="navigation-buttons">
            <button id="prev-button" class="button" type="button">Atrás</button>
            <button id="next-button" class="button" type="button">Siguiente</button>
        </div>
        <div id="result-container" class="hidden">
            <div class="result-content-wrapper">
                <div class="result-card">
                    <img id="result-main-img" src="" alt="">
                    <h2>Tu personaje es: <span id="result-name"></span></h2>
                    <p id="result-description"></p>
                    <p id="result-percentage"></p>
                </div>
                <div class="affinity-section">
                    <div class="chart-container">
                        <h3 id="chart-title">Porcentaje de afinidad</h3>
                        <canvas id="result-chart" width="220" height="220"></canvas>
                    </div>
                    <div id="top3-labels" class="secondary-results"></div>
                </div>
            </div>
            <button id="restart-button" class="button" type="button">
                Reiniciar quiz
            </button>
        </div>
    </div>
    <script src="main.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
    <div class="bottom-bar">
        Idea de Sinai ♥
    </div>
</body>
</html>
